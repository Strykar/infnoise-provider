name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libftdi1-dev
      - name: Build and install patched libinfnoise (Strykar fork)
        run: |
          git clone --depth 1 --branch libinfnoise-error-codes https://github.com/Strykar/infnoise /tmp/infnoise
          make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci libinfnoise.so
          sudo make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci PREFIX=/usr install-lib
          sudo ldconfig
      - name: Build provider
        run: make
      - name: Verify hardening
        run: |
          sudo apt-get install -y --no-install-recommends checksec
          checksec --file=infnoise.so || true
