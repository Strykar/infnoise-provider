name: build
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
    runs-on: ubuntu-latest
    env:
      CC: ${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libftdi1-dev
      - name: Build and install libinfnoise from upstream
        run: |
          git clone --depth 1 https://github.com/waywardgeek/infnoise /tmp/infnoise
          make -C /tmp/infnoise/software libinfnoise.so || make -C /tmp/infnoise/software
          sudo cp /tmp/infnoise/software/libinfnoise.so* /usr/lib/ 2>/dev/null || true
          sudo cp /tmp/infnoise/software/libinfnoise.h /usr/include/ 2>/dev/null || true
          sudo ldconfig
      - name: Build provider
        run: make
      - name: Verify hardening
        run: |
          sudo apt-get install -y --no-install-recommends hardening-check
          hardening-check -q infnoise.so || true
