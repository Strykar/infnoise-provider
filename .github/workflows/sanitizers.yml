name: sanitizers
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  sanitizers:
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [asan, ubsan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libftdi1-dev
      - name: Build and install libinfnoise
        run: |
          git clone --depth 1 https://github.com/waywardgeek/infnoise /tmp/infnoise
          make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci libinfnoise.so
          sudo make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci PREFIX=/usr install-lib
          sudo ldconfig
      - name: Compile with ${{ matrix.sanitizer }}
        # No TRNG on CI runners, so we only verify the sanitizer build links cleanly.
        # Runtime test execution happens locally against the device.
        run: |
          if [ "${{ matrix.sanitizer }}" = "asan" ]; then
            gcc -fPIC -Wall -Wextra -g -O1 $(pkg-config --cflags libcrypto libftdi1) \
              -fno-omit-frame-pointer -fsanitize=address -shared \
              -o infnoise.so src/infnoise_prov.c \
              $(pkg-config --libs libcrypto libftdi1) -linfnoise
          else
            gcc -fPIC -Wall -Wextra -g -O1 $(pkg-config --cflags libcrypto libftdi1) \
              -fno-omit-frame-pointer -fsanitize=undefined -shared \
              -o infnoise.so src/infnoise_prov.c \
              $(pkg-config --libs libcrypto libftdi1) -linfnoise
          fi
