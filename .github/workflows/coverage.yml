name: coverage
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  coverage:
    # Runners have no TRNG, so we link the instrumented provider against a
    # stub libinfnoise that returns canned bytes, then drive the build
    # through openssl(1).  This exercises provider load / init / readData
    # / teardown dispatch — the realistic ceiling for CI coverage on a
    # hardware-gated module.  Full runtime coverage remains a local
    # activity against the real device.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential pkg-config libssl-dev libftdi1-dev gcovr curl
      - name: Build and install stub libinfnoise
        run: |
          curl -sL https://raw.githubusercontent.com/waywardgeek/infnoise/master/software/libinfnoise.h \
            -o /tmp/libinfnoise.h
          cat > /tmp/libinfnoise_stub.c <<'EOF'
          #include <stdint.h>
          #include <stdbool.h>
          #include <string.h>
          #include "libinfnoise.h"
          bool initInfnoise(struct infnoise_context *ctx, char *serial,
                            bool keccak, bool debug) {
              (void)ctx; (void)serial; (void)keccak; (void)debug;
              return 0;
          }
          void deinitInfnoise(struct infnoise_context *ctx) { (void)ctx; }
          uint32_t readData(struct infnoise_context *ctx, uint8_t *result,
                            bool raw, uint32_t outputMultiplier) {
              (void)ctx;
              uint32_t n = raw ? 64u
                               : (outputMultiplier ? outputMultiplier * 64u : 64u);
              memset(result, 0x5a, n);
              return n;
          }
          infnoise_devlist_node_t* listUSBDevices(const char **message) {
              (void)message; return NULL;
          }
          EOF
          gcc -fPIC -shared -I/tmp -I/usr/include/libftdi1 \
            /tmp/libinfnoise_stub.c -o /tmp/libinfnoise.so
          sudo cp /tmp/libinfnoise.so /usr/lib/
          sudo cp /tmp/libinfnoise.h /usr/include/
          sudo ldconfig
      - name: Build provider with coverage instrumentation
        run: |
          gcc -fPIC -Wall -Wextra -O0 -g --coverage \
            $(pkg-config --cflags libcrypto libftdi1) \
            -shared -o infnoise.so src/infnoise_prov.c \
            $(pkg-config --libs libcrypto libftdi1) -linfnoise
      - name: Exercise provider through openssl
        run: |
          export OPENSSL_MODULES=$(pwd)
          openssl list -providers -provider infnoise
          cat > /tmp/oct.cnf <<'EOF'
          openssl_conf = openssl_init
          [openssl_init]
          providers = provider_sect
          random = random_sect
          [provider_sect]
          default = default_sect
          infnoise = infnoise_sect
          [default_sect]
          activate = 1
          [infnoise_sect]
          activate = 1
          [random_sect]
          seed = infnoise
          EOF
          OPENSSL_CONF=/tmp/oct.cnf openssl rand -hex 64
          OPENSSL_CONF=/tmp/oct.cnf openssl rand 4096 > /dev/null
          OPENSSL_CONF=/tmp/oct.cnf openssl rand 1048576 > /dev/null
      - name: Generate coverage report
        run: gcovr --xml-pretty -o coverage.xml --root .
      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          fail_ci_if_error: false
