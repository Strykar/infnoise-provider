name: CIFuzz

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  cifuzz:
    runs-on: ubuntu-latest

    # PRs get short runs for quick regression gating; pushes get more time
    # to seed the corpus and surface slow-to-trigger paths.
    env:
      FUZZ_SECONDS: ${{ github.event_name == 'pull_request' && '60' || '120' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang pkg-config libssl-dev libftdi1-dev

      - name: Build and install libinfnoise
        # The patched header (defines INFNOISE_KECCAK_STATE_SIZE) is required
        # so the provider's INFNOISE_PATCHED=1 code path is compiled in.
        run: |
          git clone --depth 1 https://github.com/waywardgeek/infnoise /tmp/infnoise
          make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci libinfnoise.so
          sudo make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci PREFIX=/usr install-lib
          sudo ldconfig

      - name: Build fuzz targets
        run: make fuzz FUZZ_CC=clang

      # Each fuzzer runs independently.  continue-on-error lets all three
      # finish even if one finds a crash, so a single bug doesn't hide others.
      - name: Run fuzz_params
        id: fuzz_params
        continue-on-error: true
        run: |
          mkdir -p fuzz/crashes
          corpus=fuzz/corpus/fuzz_params
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_params \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      - name: Run fuzz_dispatch
        id: fuzz_dispatch
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_dispatch
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_dispatch \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      - name: Run fuzz_ossl_params
        id: fuzz_ossl_params
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_ossl_params
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_ossl_params \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      # Upload whatever crash files landed (crash-*, slow-*, oom-* prefixes).
      - name: Upload crash artifacts
        if: >
          steps.fuzz_params.outcome == 'failure' ||
          steps.fuzz_dispatch.outcome == 'failure' ||
          steps.fuzz_ossl_params.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: fuzz-crashes
          path: fuzz/crashes/
          if-no-files-found: warn

      # Fail the job after all three fuzzers have had a chance to run.
      - name: Report results
        if: always()
        run: |
          failed=""
          [ "${{ steps.fuzz_params.outcome }}"      = "failure" ] && failed="$failed fuzz_params"
          [ "${{ steps.fuzz_dispatch.outcome }}"    = "failure" ] && failed="$failed fuzz_dispatch"
          [ "${{ steps.fuzz_ossl_params.outcome }}" = "failure" ] && failed="$failed fuzz_ossl_params"
          if [ -n "$failed" ]; then
            echo "Crash(es) found in:$failed — see the 'fuzz-crashes' artifact."
            exit 1
          fi
          echo "All fuzz targets completed without crashes."
