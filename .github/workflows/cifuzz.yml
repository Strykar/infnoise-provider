name: CIFuzz

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  cifuzz:
    runs-on: ubuntu-latest

    # PRs get short runs for quick regression gating; pushes get more time
    # to seed the corpus and surface slow-to-trigger paths.
    env:
      FUZZ_SECONDS: ${{ github.event_name == 'pull_request' && '60' || '120' }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang pkg-config libssl-dev libftdi1-dev

      - name: Build and install patched libinfnoise (Strykar fork)
        # The provider hard-requires the patched fork via #ifndef
        # INFNOISE_KECCAK_STATE_SIZE / #error.  Cloning the right
        # branch is the only thing that makes the build succeed.
        run: |
          git clone --depth 1 --branch libinfnoise-error-codes https://github.com/Strykar/infnoise /tmp/infnoise
          make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci libinfnoise.so
          sudo make -C /tmp/infnoise/software -f Makefile.linux \
            GIT_VERSION=ci GIT_COMMIT=ci GIT_DATE=ci PREFIX=/usr install-lib
          sudo ldconfig

      - name: Build fuzz targets
        run: make fuzz FUZZ_CC=clang

      # Each fuzzer runs independently.  continue-on-error lets all five
      # finish even if one finds a crash, so a single bug doesn't hide others.
      - name: Run fuzz_params
        id: fuzz_params
        continue-on-error: true
        run: |
          mkdir -p fuzz/crashes
          corpus=fuzz/corpus/fuzz_params
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_params \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      - name: Run fuzz_dispatch
        id: fuzz_dispatch
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_dispatch
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_dispatch \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      - name: Run fuzz_ossl_params
        id: fuzz_ossl_params
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_ossl_params
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_ossl_params \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      # Replay every committed regression input across the relevant
      # harnesses BEFORE the time-bounded fuzz run, so a regression
      # fails fast rather than waiting for the fuzzer to rediscover it.
      - name: Replay regression inputs
        run: |
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_spill_oracle fuzz/regressions/phase3_short_read.bin
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_dispatch fuzz/regressions/zero_outlen_null_ptr.bin

      - name: Run fuzz_spill_oracle
        id: fuzz_spill_oracle
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_spill_oracle
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_spill_oracle \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      - name: Run fuzz_provider_init
        id: fuzz_provider_init
        continue-on-error: true
        run: |
          corpus=fuzz/corpus/fuzz_provider_init
          ASAN_OPTIONS=abort_on_error=1:detect_leaks=1 \
          UBSAN_OPTIONS=halt_on_error=1:print_stacktrace=1 \
          ./fuzz/fuzz_provider_init \
            -max_total_time="${FUZZ_SECONDS}" \
            -artifact_prefix=fuzz/crashes/ \
            -print_final_stats=1 \
            $([ -d "$corpus" ] && ls "$corpus" &>/dev/null && echo "$corpus")

      # Upload whatever crash files landed (crash-*, slow-*, oom-* prefixes).
      - name: Upload crash artifacts
        if: >
          steps.fuzz_params.outcome        == 'failure' ||
          steps.fuzz_dispatch.outcome      == 'failure' ||
          steps.fuzz_ossl_params.outcome   == 'failure' ||
          steps.fuzz_spill_oracle.outcome  == 'failure' ||
          steps.fuzz_provider_init.outcome == 'failure'
        uses: actions/upload-artifact@v7
        with:
          name: fuzz-crashes
          path: fuzz/crashes/
          if-no-files-found: warn

      # Fail the job after all five fuzzers have had a chance to run.
      - name: Report results
        if: always()
        run: |
          failed=""
          [ "${{ steps.fuzz_params.outcome }}"        = "failure" ] && failed="$failed fuzz_params"
          [ "${{ steps.fuzz_dispatch.outcome }}"      = "failure" ] && failed="$failed fuzz_dispatch"
          [ "${{ steps.fuzz_ossl_params.outcome }}"   = "failure" ] && failed="$failed fuzz_ossl_params"
          [ "${{ steps.fuzz_spill_oracle.outcome }}"  = "failure" ] && failed="$failed fuzz_spill_oracle"
          [ "${{ steps.fuzz_provider_init.outcome }}" = "failure" ] && failed="$failed fuzz_provider_init"
          if [ -n "$failed" ]; then
            echo "Crash(es) found in:$failed — see the 'fuzz-crashes' artifact."
            exit 1
          fi
          echo "All fuzz targets completed without crashes."
