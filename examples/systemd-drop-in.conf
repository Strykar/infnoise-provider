# systemd drop-in: route a single service's OpenSSL through the
# Infnoise TRNG provider, leaving every other service on the host's
# default RNG.
#
# Install for nginx (the canonical use case):
#   sudo install -d -m 755 /etc/systemd/system/nginx.service.d
#   sudo install -m 644 systemd-drop-in.conf \
#       /etc/systemd/system/nginx.service.d/00-infnoise.conf
#   sudo systemctl daemon-reload
#   sudo systemctl restart nginx
#
# The same file works for any service (sshd, postfix, dovecot, etc.).
# Replace nginx.service.d in the path with the unit you want scoped.
# Confirm the override is active:
#   systemctl cat nginx.service | grep OPENSSL_CONF
#
# Adjust the OPENSSL_CONF path to wherever conf/infnoise-provider.cnf
# is deployed on your host.  /etc/ssl is the conventional location.

[Service]
Environment=OPENSSL_CONF=/etc/ssl/infnoise-provider.cnf
